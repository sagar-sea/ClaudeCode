        function updateCategoryCounts() {
            document.querySelectorAll('.category-btn').forEach(btn => {
                const cat = btn.dataset.category;
                let count = 0;
                if (cat === 'all') {
                    count = concepts.length;
                } else {
                    count = concepts.filter(c => c.category === cat).length;
                }
                const countSpan = btn.querySelector('.count');
                if (countSpan) {
                    countSpan.textContent = count;
                }
            });
        }

        // Initialize the page
        function initializePage() {
            updateCategoryCounts();
            renderCards();
            setupEventListeners();
        }

        // Render all cards initially
        function renderCards() {
            const container = document.getElementById('cardsContainer');
            container.innerHTML = '';
            const fragment = document.createDocumentFragment();

            concepts.forEach(concept => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.category = concept.category;
                
                const searchableText = `${concept.title} ${concept.simple_description} ${concept.technical_description} ${concept.examples.join(' ')}`.toLowerCase();
                card.dataset.search = searchableText;

                card.innerHTML = `
                    <h3>${concept.title}</h3>
                    <p><strong>Category:</strong> ${concept.category}</p>
                    
                    <div class="tab-buttons">
                        <button class="tab-btn active" data-tab="simple">Simple</button>
                        <button class="tab-btn" data-tab="technical">Technical</button>
                        <button class="tab-btn" data-tab="examples">Examples</button>
                        <button class="tab-btn" data-tab="resources">Resources</button>
                    </div>
                    
                    <div class="tab-content active" data-tab="simple">
                        <div class="description-box">
                            ${concept.simple_description}
                        </div>
                    </div>
                    
                    <div class="tab-content" data-tab="technical">
                        <div class="description-box">
                            ${concept.technical_description}
                        </div>
                    </div>
                    
                    <div class="tab-content" data-tab="examples">
                        <div class="description-box">
                            <ul class="examples-list">
                                ${concept.examples.map(example => `<li>${example}</li>`).join('')}
                            </ul>
                        </div>
                    </div>
                    
                    <div class="tab-content" data-tab="resources">
                        <div class="description-box">
                            <ul class="examples-list">
                                ${(concept.resources || []).map(r => `<li><a href="${r.url}" target="_blank" style="color: #667eea; text-decoration: none; font-weight: 500;">${r.title} ↗</a></li>`).join('')}
                            </ul>
                        </div>
                    </div>
                `;

                fragment.appendChild(card);
            });
            
            container.appendChild(fragment);
        }

        // Filter cards strictly via CSS for optimal performance
        function filterCards() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const activeCategory = document.querySelector('.category-btn.active').dataset.category;

            document.querySelectorAll('.card').forEach(card => {
                const matchesCategory = activeCategory === 'all' || card.dataset.category === activeCategory;
                const matchesSearch = !searchTerm || card.dataset.search.includes(searchTerm);
                
                if (matchesCategory && matchesSearch) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        // Set up event listeners
        function setupEventListeners() {
            // Category buttons
            document.querySelectorAll('.category-btn').forEach(button => {
                button.addEventListener('click', () => {
                    document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
                    button.classList.add('active');
                    filterCards();
                });
            });

            // Search input
            document.getElementById('searchInput').addEventListener('input', filterCards);

            // Use event delegation for tab buttons on the container level
            document.getElementById('cardsContainer').addEventListener('click', (e) => {
                if (e.target && e.target.classList.contains('tab-btn')) {
                    const card = e.target.closest('.card');
                    if (card) {
                        const tabButtons = card.querySelectorAll('.tab-btn');
                        const tabContents = card.querySelectorAll('.tab-content');
                        const tabName = e.target.getAttribute('data-tab');
                        
                        // Remove active class from all buttons and contents
                        tabButtons.forEach(btn => btn.classList.remove('active'));
                        tabContents.forEach(content => content.classList.remove('active'));
                        
                        // Add active class to clicked button and corresponding content
                        e.target.classList.add('active');
                        const targetContent = card.querySelector(`.tab-content[data-tab="${tabName}"]`);
                        if (targetContent) {
                            targetContent.classList.add('active');
                        }
                    }
                }
            });
        }

        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', initializePage);
    </script>
